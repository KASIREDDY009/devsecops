name: Plant Care Monitoring System CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '18'
  AWS_REGION: us-east-1

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Build and Test
  # ──────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # ── Backend ──
      - name: Backend - Compile
        run: mvn clean compile
        working-directory: backend/

      - name: Backend - Run Tests with Coverage
        run: mvn test jacoco:report
        working-directory: backend/

      - name: Upload JaCoCo Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: backend/target/site/jacoco/
          if-no-files-found: ignore

      # ── Frontend ──
      - name: Frontend - Install dependencies
        run: npm install
        working-directory: frontend/

      - name: Frontend - Build
        run: npm run build
        working-directory: frontend/

      - name: Frontend - Run Tests with Coverage
        run: npm test -- --watchAll=false --coverage
        working-directory: frontend/
        env:
          CI: true

      - name: Upload Frontend Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: frontend/coverage/
          if-no-files-found: ignore

  # ──────────────────────────────────────────────
  # Job 2: Static Analysis
  # ──────────────────────────────────────────────
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Backend - Compile
        run: mvn clean compile
        working-directory: backend/

      # ── SpotBugs ──
      - name: Backend - SpotBugs Analysis
        run: mvn spotbugs:check
        working-directory: backend/
        continue-on-error: true

      # ── PMD ──
      - name: Backend - PMD Analysis
        run: mvn pmd:check
        working-directory: backend/
        continue-on-error: true

      # ── OWASP Dependency Check ──
      - name: Backend - OWASP Dependency Check
        run: mvn dependency-check:check
        working-directory: backend/
        continue-on-error: true

      # ── SonarCloud (optional) ──
      - name: SonarCloud Scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORG }}
            -Dsonar.host.url=https://sonarcloud.io
        continue-on-error: true

      # ── Frontend Analysis ──
      - name: Frontend - Install dependencies
        run: npm install
        working-directory: frontend/

      - name: Frontend - npm audit
        run: npm audit --audit-level=moderate
        working-directory: frontend/
        continue-on-error: true

      - name: Frontend - ESLint Analysis
        run: npx eslint src/ --format json --output-file eslint-report.json || true
        working-directory: frontend/
        continue-on-error: true

      # ── Upload Reports ──
      - name: Upload SpotBugs Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: backend/target/spotbugsXml.xml
          if-no-files-found: ignore

      - name: Upload PMD Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pmd-report
          path: backend/target/pmd.xml
          if-no-files-found: ignore

      - name: Upload OWASP Dependency Check Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: |
            backend/target/dependency-check-report.html
            backend/target/dependency-check-report.json
          if-no-files-found: ignore

      - name: Upload ESLint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-report
          path: frontend/eslint-report.json
          if-no-files-found: ignore

  # ──────────────────────────────────────────────
  # Job 3: Security Scan
  # ──────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Trivy ──
      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          output: trivy-results.txt
          severity: CRITICAL,HIGH,MEDIUM

      - name: Display Trivy Results
        if: always()
        run: cat trivy-results.txt

      - name: Upload Trivy Scan Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.txt
          if-no-files-found: ignore

      # ── OWASP ZAP (only after infra is deployed) ──
      - name: Configure AWS Credentials
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
        continue-on-error: true

      - name: Get EC2 Host for ZAP Scan
        id: get-ec2
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          EC2_IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=plantcare-server" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' --output text 2>/dev/null) || true
          echo "ec2_ip=$EC2_IP" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: OWASP ZAP Baseline Scan
        if: steps.get-ec2.outputs.ec2_ip != '' && steps.get-ec2.outputs.ec2_ip != 'None'
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: http://${{ steps.get-ec2.outputs.ec2_ip }}:8080
          rules_file_name: .zap/rules.tsv
          cmd_options: '-a'
          allow_issue_writing: false
        continue-on-error: true

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html
          if-no-files-found: ignore

  # ──────────────────────────────────────────────
  # Job 4: Deploy to AWS (auto-fetches all config)
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: [static-analysis, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Get EC2 IP ──
      - name: Get EC2 IP
        id: infra
        run: |
          EC2_IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=plantcare-server" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' --output text)
          echo "EC2 IP: $EC2_IP"
          echo "ec2_ip=$EC2_IP" >> $GITHUB_OUTPUT

      # ── Get SSH Key ──
      - name: Retrieve SSH Key
        run: |
          aws ssm get-parameter --name "/plantcare/ec2-key" \
            --with-decryption --query 'Parameter.Value' --output text > ec2_key.pem
          chmod 600 ec2_key.pem
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ steps.infra.outputs.ec2_ip }} >> ~/.ssh/known_hosts 2>/dev/null

      # ── Build Backend ──
      - name: Backend - Build JAR
        run: mvn clean package -DskipTests
        working-directory: backend/

      # ── Build Frontend ──
      - name: Frontend - Install dependencies
        run: npm install
        working-directory: frontend/

      - name: Frontend - Build for production
        run: npm run build
        working-directory: frontend/
        env:
          REACT_APP_API_URL: http://${{ steps.infra.outputs.ec2_ip }}/api

      # ── Deploy to EC2 ──
      - name: Deploy Backend JAR
        run: |
          scp -i ec2_key.pem -o StrictHostKeyChecking=no \
            backend/target/*.jar \
            ec2-user@${{ steps.infra.outputs.ec2_ip }}:/tmp/app.jar

      - name: Deploy Frontend Build
        run: |
          tar -czf /tmp/frontend.tar.gz -C frontend/build .
          scp -i ec2_key.pem -o StrictHostKeyChecking=no \
            /tmp/frontend.tar.gz \
            ec2-user@${{ steps.infra.outputs.ec2_ip }}:/tmp/frontend.tar.gz

      - name: Start Application
        run: |
          ssh -i ec2_key.pem -o StrictHostKeyChecking=no \
            ec2-user@${{ steps.infra.outputs.ec2_ip }} << 'ENDSSH'

            # Deploy backend
            sudo mv /tmp/app.jar /opt/plantcare/app.jar
            sudo chown plantcare:plantcare /opt/plantcare/app.jar

            # Deploy frontend
            sudo rm -rf /var/www/plantcare/*
            sudo tar -xzf /tmp/frontend.tar.gz -C /var/www/plantcare/
            sudo chown -R nginx:nginx /var/www/plantcare/

            # Restart services
            sudo systemctl restart plantcare || sudo systemctl start plantcare
            sudo systemctl restart nginx

            sleep 5
            sudo systemctl status plantcare --no-pager || true
            echo "=== Deployment Complete ==="
          ENDSSH

      - name: Clean up SSH key
        if: always()
        run: rm -f ec2_key.pem

      - name: Verify Deployment
        run: |
          echo "============================================="
          echo "  Deployment Complete!"
          echo "============================================="
          echo "  App: http://${{ steps.infra.outputs.ec2_ip }}"
          echo "  API: http://${{ steps.infra.outputs.ec2_ip }}/api"
          echo "============================================="
          sleep 10
          curl -s http://${{ steps.infra.outputs.ec2_ip }} | head -5 || echo "Starting up..."
