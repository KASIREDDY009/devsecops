name: Plant Care Monitoring System CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '18'
  S3_BUCKET: ${{ secrets.S3_BUCKET }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Build and Test
  # ──────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # Backend build and test
      - name: Backend - Compile
        run: mvn clean compile
        working-directory: backend/

      - name: Backend - Run Tests with Coverage
        run: mvn test jacoco:report
        working-directory: backend/

      # Upload JaCoCo coverage report
      - name: Upload JaCoCo Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: backend/target/site/jacoco/
          if-no-files-found: ignore

      # Frontend build and test
      - name: Frontend - Install dependencies
        run: npm install
        working-directory: frontend/

      - name: Frontend - Build
        run: npm run build
        working-directory: frontend/

      - name: Frontend - Run Tests with Coverage
        run: npm test -- --watchAll=false --coverage
        working-directory: frontend/
        env:
          CI: true

      # Upload frontend coverage
      - name: Upload Frontend Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: frontend/coverage/
          if-no-files-found: ignore

  # ──────────────────────────────────────────────
  # Job 2: Static Analysis
  # ──────────────────────────────────────────────
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # Compile first for SpotBugs bytecode analysis
      - name: Backend - Compile
        run: mvn clean compile
        working-directory: backend/

      # Backend static analysis
      - name: Backend - SpotBugs Analysis
        run: mvn spotbugs:check
        working-directory: backend/
        continue-on-error: true

      - name: Backend - PMD Analysis
        run: mvn pmd:check
        working-directory: backend/
        continue-on-error: true

      - name: Backend - OWASP Dependency Check
        run: mvn dependency-check:check
        working-directory: backend/
        continue-on-error: true

      # SonarCloud analysis
      - name: SonarCloud Scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORG }}
            -Dsonar.host.url=https://sonarcloud.io
        continue-on-error: true

      # Frontend static analysis
      - name: Frontend - Install dependencies
        run: npm install
        working-directory: frontend/

      - name: Frontend - npm audit
        run: npm audit --audit-level=moderate
        working-directory: frontend/
        continue-on-error: true

      - name: Frontend - ESLint Analysis
        run: npx eslint src/ --format json --output-file eslint-report.json || true
        working-directory: frontend/
        continue-on-error: true

      # Upload reports
      - name: Upload SpotBugs Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: backend/target/spotbugsXml.xml
          if-no-files-found: ignore

      - name: Upload PMD Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pmd-report
          path: backend/target/pmd.xml
          if-no-files-found: ignore

      - name: Upload OWASP Dependency Check Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: |
            backend/target/dependency-check-report.html
            backend/target/dependency-check-report.json
          if-no-files-found: ignore

      - name: Upload ESLint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-report
          path: frontend/eslint-report.json
          if-no-files-found: ignore

  # ──────────────────────────────────────────────
  # Job 3: Security Scan
  # ──────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Trivy filesystem scan
      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          output: trivy-results.txt
          severity: CRITICAL,HIGH,MEDIUM

      - name: Display Trivy Results
        if: always()
        run: cat trivy-results.txt

      - name: Upload Trivy Scan Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.txt
          if-no-files-found: ignore

      # OWASP ZAP baseline scan (only on main branch after deploy)
      - name: OWASP ZAP Baseline Scan
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: http://${{ secrets.EC2_HOST }}:8080
          rules_file_name: .zap/rules.tsv
          cmd_options: '-a'
          allow_issue_writing: false
        continue-on-error: true

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html
          if-no-files-found: ignore

  # ──────────────────────────────────────────────
  # Job 4: Deploy (main branch only)
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: [static-analysis, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Build backend JAR
      - name: Backend - Build JAR
        run: mvn clean package -DskipTests
        working-directory: backend/

      # Build frontend
      - name: Frontend - Install dependencies
        run: npm install
        working-directory: frontend/

      - name: Frontend - Build for production
        run: npm run build
        working-directory: frontend/
        env:
          REACT_APP_API_URL: https://${{ secrets.CLOUDFRONT_DOMAIN }}/api

      # Deploy frontend to S3
      - name: Deploy Frontend to S3
        run: aws s3 sync frontend/build/ s3://${{ secrets.S3_BUCKET }} --delete

      # Invalidate CloudFront cache
      - name: Invalidate CloudFront Distribution
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      # Deploy backend to EC2 via SSH
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy JAR to EC2
        run: |
          scp -i ~/.ssh/ec2_key.pem \
            backend/target/*.jar \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/${{ secrets.EC2_USER }}/plantcare-app.jar

      - name: Restart application on EC2
        run: |
          ssh -i ~/.ssh/ec2_key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            # Stop existing application
            sudo systemctl stop plantcare || true

            # Move JAR to application directory
            sudo mv /home/$USER/plantcare-app.jar /opt/plantcare/plantcare-app.jar
            sudo chown root:root /opt/plantcare/plantcare-app.jar

            # Start the application
            sudo systemctl start plantcare
            sudo systemctl enable plantcare

            # Wait and verify the service is running
            sleep 10
            sudo systemctl status plantcare
          ENDSSH

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/ec2_key.pem

      - name: Verify deployment
        run: |
          echo "Waiting for application to start..."
          sleep 15
          curl -f -s -o /dev/null -w "%{http_code}" http://${{ secrets.EC2_HOST }}:8080/api/actuator/health || echo "Health check pending - service may still be starting"
