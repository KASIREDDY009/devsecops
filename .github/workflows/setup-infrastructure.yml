name: Setup AWS Infrastructure

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - destroy

env:
  AWS_REGION: us-east-1
  APP_NAME: plantcare
  DB_PASSWORD: PlantCare2024Secure
  JWT_SECRET: cGxhbnRjYXJlLW1vbml0b3Jpbmctand0LXNlY3JldC1rZXktZm9yLXByb2R1Y3Rpb24tMjAyNC1tc2MtcHJvamVjdC1zZWN1cmU=

jobs:
  infrastructure:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ══════════════════════════════════════════
      #  DEPLOY
      # ══════════════════════════════════════════
      - name: Delete old failed CloudFormation stack (if any)
        if: ${{ github.event.inputs.action == 'deploy' }}
        run: |
          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name plantcare-stack \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null) || STACK_STATUS="NONE"
          echo "Stack status: $STACK_STATUS"
          if [[ "$STACK_STATUS" == *"FAILED"* ]] || [[ "$STACK_STATUS" == *"ROLLBACK"* ]]; then
            echo "Deleting failed stack..."
            aws cloudformation delete-stack --stack-name plantcare-stack
            aws cloudformation wait stack-delete-complete --stack-name plantcare-stack
            echo "Deleted."
          fi

      - name: Create VPC
        if: ${{ github.event.inputs.action == 'deploy' }}
        id: vpc
        run: |
          # Check if VPC already exists
          EXISTING=$(aws ec2 describe-vpcs --filters "Name=tag:Name,Values=${{ env.APP_NAME }}-vpc" --query 'Vpcs[0].VpcId' --output text 2>/dev/null) || true
          if [ "$EXISTING" != "None" ] && [ -n "$EXISTING" ]; then
            echo "VPC already exists: $EXISTING"
            echo "vpc_id=$EXISTING" >> $GITHUB_OUTPUT
            exit 0
          fi

          VPC_ID=$(aws ec2 create-vpc --cidr-block 10.0.0.0/16 \
            --query 'Vpc.VpcId' --output text)
          aws ec2 modify-vpc-attribute --vpc-id $VPC_ID --enable-dns-hostnames
          aws ec2 create-tags --resources $VPC_ID --tags Key=Name,Value=${{ env.APP_NAME }}-vpc
          echo "VPC created: $VPC_ID"
          echo "vpc_id=$VPC_ID" >> $GITHUB_OUTPUT

      - name: Create Internet Gateway & Subnet
        if: ${{ github.event.inputs.action == 'deploy' }}
        id: network
        run: |
          VPC_ID="${{ steps.vpc.outputs.vpc_id }}"

          # Internet Gateway
          EXISTING_IGW=$(aws ec2 describe-internet-gateways \
            --filters "Name=attachment.vpc-id,Values=$VPC_ID" \
            --query 'InternetGateways[0].InternetGatewayId' --output text 2>/dev/null) || true
          if [ "$EXISTING_IGW" != "None" ] && [ -n "$EXISTING_IGW" ]; then
            IGW_ID=$EXISTING_IGW
          else
            IGW_ID=$(aws ec2 create-internet-gateway --query 'InternetGateway.InternetGatewayId' --output text)
            aws ec2 attach-internet-gateway --internet-gateway-id $IGW_ID --vpc-id $VPC_ID
            aws ec2 create-tags --resources $IGW_ID --tags Key=Name,Value=${{ env.APP_NAME }}-igw
          fi
          echo "IGW: $IGW_ID"

          # Subnet
          EXISTING_SUB=$(aws ec2 describe-subnets \
            --filters "Name=vpc-id,Values=$VPC_ID" "Name=tag:Name,Values=${{ env.APP_NAME }}-subnet" \
            --query 'Subnets[0].SubnetId' --output text 2>/dev/null) || true
          if [ "$EXISTING_SUB" != "None" ] && [ -n "$EXISTING_SUB" ]; then
            SUBNET_ID=$EXISTING_SUB
          else
            AZ=$(aws ec2 describe-availability-zones --query 'AvailabilityZones[0].ZoneName' --output text)
            SUBNET_ID=$(aws ec2 create-subnet --vpc-id $VPC_ID --cidr-block 10.0.1.0/24 \
              --availability-zone $AZ --query 'Subnet.SubnetId' --output text)
            aws ec2 modify-subnet-attribute --subnet-id $SUBNET_ID --map-public-ip-on-launch
            aws ec2 create-tags --resources $SUBNET_ID --tags Key=Name,Value=${{ env.APP_NAME }}-subnet
          fi
          echo "Subnet: $SUBNET_ID"

          # Route Table
          RT_ID=$(aws ec2 describe-route-tables --filters "Name=vpc-id,Values=$VPC_ID" \
            --query 'RouteTables[0].RouteTableId' --output text)
          aws ec2 create-route --route-table-id $RT_ID --destination-cidr-block 0.0.0.0/0 \
            --gateway-id $IGW_ID 2>/dev/null || true
          aws ec2 associate-route-table --route-table-id $RT_ID --subnet-id $SUBNET_ID 2>/dev/null || true

          echo "subnet_id=$SUBNET_ID" >> $GITHUB_OUTPUT

      - name: Create Security Group
        if: ${{ github.event.inputs.action == 'deploy' }}
        id: sg
        run: |
          VPC_ID="${{ steps.vpc.outputs.vpc_id }}"

          EXISTING_SG=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=${{ env.APP_NAME }}-sg" "Name=vpc-id,Values=$VPC_ID" \
            --query 'SecurityGroups[0].GroupId' --output text 2>/dev/null) || true
          if [ "$EXISTING_SG" != "None" ] && [ -n "$EXISTING_SG" ]; then
            echo "SG already exists: $EXISTING_SG"
            echo "sg_id=$EXISTING_SG" >> $GITHUB_OUTPUT
            exit 0
          fi

          SG_ID=$(aws ec2 create-security-group --group-name ${{ env.APP_NAME }}-sg \
            --description "PlantCare Security Group" --vpc-id $VPC_ID \
            --query 'GroupId' --output text)

          # SSH
          aws ec2 authorize-security-group-ingress --group-id $SG_ID --protocol tcp --port 22 --cidr 0.0.0.0/0
          # HTTP
          aws ec2 authorize-security-group-ingress --group-id $SG_ID --protocol tcp --port 80 --cidr 0.0.0.0/0
          # HTTPS
          aws ec2 authorize-security-group-ingress --group-id $SG_ID --protocol tcp --port 443 --cidr 0.0.0.0/0
          # Spring Boot
          aws ec2 authorize-security-group-ingress --group-id $SG_ID --protocol tcp --port 8080 --cidr 0.0.0.0/0

          echo "Security Group: $SG_ID"
          echo "sg_id=$SG_ID" >> $GITHUB_OUTPUT

      - name: Create Key Pair
        if: ${{ github.event.inputs.action == 'deploy' }}
        id: keypair
        run: |
          # Delete old key pair if exists
          aws ec2 delete-key-pair --key-name ${{ env.APP_NAME }}-keypair 2>/dev/null || true
          aws ssm delete-parameter --name /ec2/keypair/${{ env.APP_NAME }} 2>/dev/null || true

          # Create new key pair and save to SSM
          KEY_MATERIAL=$(aws ec2 create-key-pair --key-name ${{ env.APP_NAME }}-keypair \
            --query 'KeyMaterial' --output text)

          aws ssm put-parameter \
            --name "/ec2/keypair/${{ env.APP_NAME }}" \
            --value "$KEY_MATERIAL" \
            --type SecureString \
            --overwrite

          echo "Key pair created and stored in SSM"

      - name: Create IAM Role & Instance Profile
        if: ${{ github.event.inputs.action == 'deploy' }}
        run: |
          # Check if role exists
          aws iam get-role --role-name ${{ env.APP_NAME }}-ec2-role 2>/dev/null && {
            echo "IAM role already exists"
            exit 0
          }

          # Create role
          aws iam create-role --role-name ${{ env.APP_NAME }}-ec2-role \
            --assume-role-policy-document '{
              "Version": "2012-10-17",
              "Statement": [{
                "Effect": "Allow",
                "Principal": {"Service": "ec2.amazonaws.com"},
                "Action": "sts:AssumeRole"
              }]
            }'

          aws iam attach-role-policy --role-name ${{ env.APP_NAME }}-ec2-role \
            --policy-arn arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
          aws iam attach-role-policy --role-name ${{ env.APP_NAME }}-ec2-role \
            --policy-arn arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy

          # Create instance profile
          aws iam create-instance-profile --instance-profile-name ${{ env.APP_NAME }}-ec2-profile 2>/dev/null || true
          aws iam add-role-to-instance-profile \
            --instance-profile-name ${{ env.APP_NAME }}-ec2-profile \
            --role-name ${{ env.APP_NAME }}-ec2-role 2>/dev/null || true

          echo "IAM role and instance profile created"
          sleep 10  # wait for IAM propagation

      - name: Launch EC2 Instance
        if: ${{ github.event.inputs.action == 'deploy' }}
        id: ec2
        run: |
          # Check if instance already exists
          EXISTING=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${{ env.APP_NAME }}-backend" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' --output text 2>/dev/null) || true
          if [ "$EXISTING" != "None" ] && [ -n "$EXISTING" ]; then
            IP=$(aws ec2 describe-instances --instance-ids $EXISTING \
              --query 'Reservations[0].Instances[0].PublicIpAddress' --output text)
            echo "EC2 already exists: $EXISTING ($IP)"
            echo "instance_id=$EXISTING" >> $GITHUB_OUTPUT
            echo "ec2_ip=$IP" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Get latest Amazon Linux 2023 AMI
          AMI_ID=$(aws ssm get-parameters --names /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64 \
            --query 'Parameters[0].Value' --output text)
          echo "AMI: $AMI_ID"

          # Create user data script
          cat > /tmp/userdata.sh << 'USERDATA'
          #!/bin/bash
          set -euxo pipefail
          exec > /var/log/user-data.log 2>&1
          echo "=== Plant Care EC2 Setup ==="

          # Install Java 17
          yum install -y java-17-amazon-corretto-headless

          # Install PostgreSQL 15
          yum install -y postgresql15-server postgresql15
          postgresql-setup --initdb
          systemctl enable postgresql
          systemctl start postgresql

          # Configure PostgreSQL
          sudo -u postgres psql -c "CREATE USER plantcare_admin WITH PASSWORD 'PlantCare2024Secure';"
          sudo -u postgres psql -c "CREATE DATABASE plantcare OWNER plantcare_admin;"
          sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE plantcare TO plantcare_admin;"

          # Allow password auth
          sed -i 's/ident/md5/g' /var/lib/pgsql/data/pg_hba.conf || true
          sed -i 's/peer/md5/g' /var/lib/pgsql/data/pg_hba.conf || true
          systemctl restart postgresql

          # Install nginx
          yum install -y nginx

          # Create app directory
          useradd -r -s /bin/false plantcare || true
          mkdir -p /opt/plantcare
          chown plantcare:plantcare /opt/plantcare

          # Environment file
          cat > /opt/plantcare/.env << 'ENVFILE'
          DB_HOST=localhost
          DB_PORT=5432
          DB_NAME=plantcare
          DB_USER=plantcare_admin
          DB_PASSWORD=PlantCare2024Secure
          JWT_SECRET=cGxhbnRjYXJlLW1vbml0b3Jpbmctand0LXNlY3JldC1rZXktZm9yLXByb2R1Y3Rpb24tMjAyNC1tc2MtcHJvamVjdC1zZWN1cmU=
          SPRING_PROFILES_ACTIVE=prod
          SERVER_PORT=8080
          ENVFILE
          chmod 600 /opt/plantcare/.env
          chown plantcare:plantcare /opt/plantcare/.env

          # Systemd service
          cat > /etc/systemd/system/plantcare.service << 'SVCFILE'
          [Unit]
          Description=Plant Care Monitoring System
          After=network.target postgresql.service
          [Service]
          Type=simple
          User=plantcare
          Group=plantcare
          WorkingDirectory=/opt/plantcare
          EnvironmentFile=/opt/plantcare/.env
          ExecStart=/usr/bin/java -jar -Dspring.profiles.active=prod /opt/plantcare/plantcare-app.jar
          Restart=on-failure
          RestartSec=10
          SuccessExitStatus=143
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier=plantcare
          [Install]
          WantedBy=multi-user.target
          SVCFILE
          systemctl daemon-reload
          systemctl enable plantcare

          # Nginx config
          cat > /etc/nginx/conf.d/plantcare.conf << 'NGINXFILE'
          server {
              listen 80;
              server_name _;
              add_header X-Frame-Options "SAMEORIGIN" always;
              add_header X-Content-Type-Options "nosniff" always;
              add_header X-XSS-Protection "1; mode=block" always;
              location /api/ {
                  proxy_pass http://127.0.0.1:8080/api/;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_read_timeout 90;
              }
              location /actuator/health {
                  proxy_pass http://127.0.0.1:8080/actuator/health;
              }
              location / {
                  return 200 'Plant Care Backend Running';
                  add_header Content-Type text/plain;
              }
          }
          NGINXFILE
          rm -f /etc/nginx/conf.d/default.conf 2>/dev/null || true
          systemctl enable nginx
          systemctl start nginx
          echo "=== EC2 Setup Complete ==="
          USERDATA

          # Launch instance
          INSTANCE_ID=$(aws ec2 run-instances \
            --image-id $AMI_ID \
            --instance-type t2.micro \
            --key-name ${{ env.APP_NAME }}-keypair \
            --security-group-ids ${{ steps.sg.outputs.sg_id }} \
            --subnet-id ${{ steps.network.outputs.subnet_id }} \
            --iam-instance-profile Name=${{ env.APP_NAME }}-ec2-profile \
            --user-data file:///tmp/userdata.sh \
            --tag-specifications "ResourceType=instance,Tags=[{Key=Name,Value=${{ env.APP_NAME }}-backend}]" \
            --query 'Instances[0].InstanceId' --output text)

          echo "Waiting for instance to be running..."
          aws ec2 wait instance-running --instance-ids $INSTANCE_ID

          EC2_IP=$(aws ec2 describe-instances --instance-ids $INSTANCE_ID \
            --query 'Reservations[0].Instances[0].PublicIpAddress' --output text)

          echo "EC2 Instance: $INSTANCE_ID"
          echo "EC2 IP: $EC2_IP"
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "ec2_ip=$EC2_IP" >> $GITHUB_OUTPUT

      - name: Create S3 Bucket
        if: ${{ github.event.inputs.action == 'deploy' }}
        id: s3
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET_NAME="${{ env.APP_NAME }}-frontend-${ACCOUNT_ID}"

          # Create bucket if not exists
          aws s3api head-bucket --bucket $BUCKET_NAME 2>/dev/null || \
            aws s3api create-bucket --bucket $BUCKET_NAME --region ${{ env.AWS_REGION }}

          # Configure for static website
          aws s3 website s3://$BUCKET_NAME --index-document index.html --error-document index.html

          echo "S3 Bucket: $BUCKET_NAME"
          echo "bucket_name=$BUCKET_NAME" >> $GITHUB_OUTPUT

      - name: Create CloudFront Distribution
        if: ${{ github.event.inputs.action == 'deploy' }}
        id: cloudfront
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET_NAME="${{ steps.s3.outputs.bucket_name }}"
          EC2_DNS=$(aws ec2 describe-instances --instance-ids ${{ steps.ec2.outputs.instance_id }} \
            --query 'Reservations[0].Instances[0].PublicDnsName' --output text)

          # Check if distribution already exists
          EXISTING_DIST=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='${{ env.APP_NAME }}-cdn'].Id" \
            --output text 2>/dev/null) || true
          if [ -n "$EXISTING_DIST" ] && [ "$EXISTING_DIST" != "None" ]; then
            DOMAIN=$(aws cloudfront get-distribution --id $EXISTING_DIST \
              --query 'Distribution.DomainName' --output text)
            echo "CloudFront already exists: $EXISTING_DIST ($DOMAIN)"
            echo "dist_id=$EXISTING_DIST" >> $GITHUB_OUTPUT
            echo "cf_domain=$DOMAIN" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Create OAC
          OAC_ID=$(aws cloudfront create-origin-access-control \
            --origin-access-control-config '{
              "Name": "plantcare-oac",
              "OriginAccessControlOriginType": "s3",
              "SigningBehavior": "always",
              "SigningProtocol": "sigv4"
            }' --query 'OriginAccessControl.Id' --output text)

          # Create distribution config
          cat > /tmp/cf-config.json << CFEOF
          {
            "CallerReference": "plantcare-$(date +%s)",
            "Comment": "${{ env.APP_NAME }}-cdn",
            "Enabled": true,
            "DefaultRootObject": "index.html",
            "Origins": {
              "Quantity": 2,
              "Items": [
                {
                  "Id": "S3Origin",
                  "DomainName": "${BUCKET_NAME}.s3.${AWS_REGION}.amazonaws.com",
                  "OriginAccessControlId": "${OAC_ID}",
                  "S3OriginConfig": {"OriginAccessIdentity": ""}
                },
                {
                  "Id": "BackendOrigin",
                  "DomainName": "${EC2_DNS}",
                  "CustomOriginConfig": {
                    "HTTPPort": 80,
                    "HTTPSPort": 443,
                    "OriginProtocolPolicy": "http-only"
                  }
                }
              ]
            },
            "DefaultCacheBehavior": {
              "TargetOriginId": "S3Origin",
              "ViewerProtocolPolicy": "redirect-to-https",
              "AllowedMethods": {"Quantity": 3, "Items": ["GET", "HEAD", "OPTIONS"], "CachedMethods": {"Quantity": 2, "Items": ["GET", "HEAD"]}},
              "ForwardedValues": {"QueryString": false, "Cookies": {"Forward": "none"}},
              "Compress": true,
              "MinTTL": 0,
              "DefaultTTL": 86400,
              "MaxTTL": 31536000
            },
            "CacheBehaviors": {
              "Quantity": 1,
              "Items": [{
                "PathPattern": "/api/*",
                "TargetOriginId": "BackendOrigin",
                "ViewerProtocolPolicy": "allow-all",
                "AllowedMethods": {"Quantity": 7, "Items": ["GET", "HEAD", "OPTIONS", "PUT", "POST", "PATCH", "DELETE"], "CachedMethods": {"Quantity": 2, "Items": ["GET", "HEAD"]}},
                "ForwardedValues": {"QueryString": true, "Cookies": {"Forward": "all"}, "Headers": {"Quantity": 2, "Items": ["Authorization", "Content-Type"]}},
                "MinTTL": 0,
                "DefaultTTL": 0,
                "MaxTTL": 0
              }]
            },
            "CustomErrorResponses": {
              "Quantity": 2,
              "Items": [
                {"ErrorCode": 403, "ResponseCode": "200", "ResponsePagePath": "/index.html", "ErrorCachingMinTTL": 0},
                {"ErrorCode": 404, "ResponseCode": "200", "ResponsePagePath": "/index.html", "ErrorCachingMinTTL": 0}
              ]
            },
            "PriceClass": "PriceClass_100"
          }
          CFEOF

          DIST_ID=$(aws cloudfront create-distribution \
            --distribution-config file:///tmp/cf-config.json \
            --query 'Distribution.Id' --output text)

          CF_DOMAIN=$(aws cloudfront get-distribution --id $DIST_ID \
            --query 'Distribution.DomainName' --output text)

          # Add S3 bucket policy for CloudFront
          cat > /tmp/bucket-policy.json << BPEOF
          {
            "Version": "2012-10-17",
            "Statement": [{
              "Sid": "AllowCloudFrontAccess",
              "Effect": "Allow",
              "Principal": {"Service": "cloudfront.amazonaws.com"},
              "Action": "s3:GetObject",
              "Resource": "arn:aws:s3:::${BUCKET_NAME}/*",
              "Condition": {
                "StringEquals": {
                  "AWS:SourceArn": "arn:aws:cloudfront::${ACCOUNT_ID}:distribution/${DIST_ID}"
                }
              }
            }]
          }
          BPEOF
          aws s3api put-bucket-policy --bucket $BUCKET_NAME --policy file:///tmp/bucket-policy.json

          echo "CloudFront: $DIST_ID"
          echo "Domain: $CF_DOMAIN"
          echo "dist_id=$DIST_ID" >> $GITHUB_OUTPUT
          echo "cf_domain=$CF_DOMAIN" >> $GITHUB_OUTPUT

      - name: Create CloudWatch Log Group
        if: ${{ github.event.inputs.action == 'deploy' }}
        run: |
          aws logs create-log-group --log-group-name /plantcare/application 2>/dev/null || true
          aws logs put-retention-policy --log-group-name /plantcare/application --retention-in-days 7
          echo "CloudWatch log group created"

      - name: Display Infrastructure Summary
        if: ${{ github.event.inputs.action == 'deploy' }}
        run: |
          echo "============================================="
          echo "  AWS Infrastructure Ready!"
          echo "============================================="
          echo ""
          echo "  EC2 Instance:    ${{ steps.ec2.outputs.instance_id }}"
          echo "  EC2 IP:          ${{ steps.ec2.outputs.ec2_ip }}"
          echo "  S3 Bucket:       ${{ steps.s3.outputs.bucket_name }}"
          echo "  CloudFront ID:   ${{ steps.cloudfront.outputs.dist_id }}"
          echo "  CloudFront URL:  https://${{ steps.cloudfront.outputs.cf_domain }}"
          echo ""
          echo "  SSH Key stored in SSM: /ec2/keypair/${{ env.APP_NAME }}"
          echo ""
          echo "  6 AWS Services Used:"
          echo "    1. EC2       - Backend + PostgreSQL"
          echo "    2. S3        - Frontend hosting"
          echo "    3. CloudFront - CDN"
          echo "    4. IAM       - Roles & policies"
          echo "    5. VPC       - Networking & security groups"
          echo "    6. CloudWatch - Logging & monitoring"
          echo ""
          echo "  Next: Push code to main to trigger deployment!"
          echo "============================================="

      # ══════════════════════════════════════════
      #  DESTROY
      # ══════════════════════════════════════════
      - name: Destroy All Resources
        if: ${{ github.event.inputs.action == 'destroy' }}
        run: |
          echo "============================================="
          echo "  Destroying ALL AWS Resources"
          echo "============================================="
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          # 1. Terminate EC2
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${{ env.APP_NAME }}-backend" "Name=instance-state-name,Values=running,stopped" \
            --query 'Reservations[0].Instances[0].InstanceId' --output text 2>/dev/null) || true
          if [ -n "$INSTANCE_ID" ] && [ "$INSTANCE_ID" != "None" ]; then
            echo "Terminating EC2: $INSTANCE_ID"
            aws ec2 terminate-instances --instance-ids $INSTANCE_ID
            aws ec2 wait instance-terminated --instance-ids $INSTANCE_ID
          fi

          # 2. Delete CloudFront
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='${{ env.APP_NAME }}-cdn'].Id" \
            --output text 2>/dev/null) || true
          if [ -n "$DIST_ID" ] && [ "$DIST_ID" != "None" ]; then
            echo "Disabling CloudFront: $DIST_ID"
            ETAG=$(aws cloudfront get-distribution-config --id $DIST_ID --query 'ETag' --output text)
            aws cloudfront get-distribution-config --id $DIST_ID --query 'DistributionConfig' > /tmp/cf-disable.json
            python3 -c "import json; d=json.load(open('/tmp/cf-disable.json')); d['Enabled']=False; json.dump(d, open('/tmp/cf-disable.json','w'))"
            aws cloudfront update-distribution --id $DIST_ID --if-match $ETAG --distribution-config file:///tmp/cf-disable.json || true
            echo "CloudFront disabled (will delete after propagation)"
          fi

          # 3. Empty and delete S3
          BUCKET="${{ env.APP_NAME }}-frontend-${ACCOUNT_ID}"
          aws s3 rm s3://$BUCKET --recursive 2>/dev/null || true
          aws s3api delete-bucket --bucket $BUCKET 2>/dev/null || true

          # 4. Delete Key Pair
          aws ec2 delete-key-pair --key-name ${{ env.APP_NAME }}-keypair 2>/dev/null || true
          aws ssm delete-parameter --name /ec2/keypair/${{ env.APP_NAME }} 2>/dev/null || true

          # 5. Delete IAM
          aws iam remove-role-from-instance-profile \
            --instance-profile-name ${{ env.APP_NAME }}-ec2-profile \
            --role-name ${{ env.APP_NAME }}-ec2-role 2>/dev/null || true
          aws iam delete-instance-profile --instance-profile-name ${{ env.APP_NAME }}-ec2-profile 2>/dev/null || true
          aws iam detach-role-policy --role-name ${{ env.APP_NAME }}-ec2-role \
            --policy-arn arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore 2>/dev/null || true
          aws iam detach-role-policy --role-name ${{ env.APP_NAME }}-ec2-role \
            --policy-arn arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy 2>/dev/null || true
          aws iam delete-role --role-name ${{ env.APP_NAME }}-ec2-role 2>/dev/null || true

          # 6. Delete Security Group
          VPC_ID=$(aws ec2 describe-vpcs --filters "Name=tag:Name,Values=${{ env.APP_NAME }}-vpc" \
            --query 'Vpcs[0].VpcId' --output text 2>/dev/null) || true
          if [ -n "$VPC_ID" ] && [ "$VPC_ID" != "None" ]; then
            SG_ID=$(aws ec2 describe-security-groups \
              --filters "Name=group-name,Values=${{ env.APP_NAME }}-sg" "Name=vpc-id,Values=$VPC_ID" \
              --query 'SecurityGroups[0].GroupId' --output text 2>/dev/null) || true
            aws ec2 delete-security-group --group-id $SG_ID 2>/dev/null || true

            # Delete subnet, route table, internet gateway, VPC
            SUBNET_ID=$(aws ec2 describe-subnets --filters "Name=vpc-id,Values=$VPC_ID" \
              --query 'Subnets[0].SubnetId' --output text 2>/dev/null) || true
            aws ec2 delete-subnet --subnet-id $SUBNET_ID 2>/dev/null || true

            IGW_ID=$(aws ec2 describe-internet-gateways \
              --filters "Name=attachment.vpc-id,Values=$VPC_ID" \
              --query 'InternetGateways[0].InternetGatewayId' --output text 2>/dev/null) || true
            aws ec2 detach-internet-gateway --internet-gateway-id $IGW_ID --vpc-id $VPC_ID 2>/dev/null || true
            aws ec2 delete-internet-gateway --internet-gateway-id $IGW_ID 2>/dev/null || true

            aws ec2 delete-vpc --vpc-id $VPC_ID 2>/dev/null || true
          fi

          # 7. Delete CloudWatch
          aws logs delete-log-group --log-group-name /plantcare/application 2>/dev/null || true

          # 8. Delete CF stack if any
          aws cloudformation delete-stack --stack-name plantcare-stack 2>/dev/null || true

          echo "============================================="
          echo "  All resources destroyed!"
          echo "============================================="
