AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Plant Care Monitoring System — Full AWS Infrastructure
  Creates EC2, RDS, S3, CloudFront, IAM, and VPC resources.
  MSc Cloud DevOpsSec Project

# ============================================================
# Parameters
# ============================================================
Parameters:
  EnvironmentName:
    Type: String
    Default: plantcare
    Description: Name prefix for all resources

  InstanceType:
    Type: String
    Default: t2.micro
    AllowedValues: [t2.micro, t2.small, t3.micro]
    Description: EC2 instance type (t2.micro = free tier)

  DBInstanceClass:
    Type: String
    Default: db.t3.micro
    AllowedValues: [db.t3.micro, db.t3.small]
    Description: RDS instance class (db.t3.micro = free tier)

  DBPassword:
    Type: String
    Default: PlantCare2024Secure
    NoEcho: true
    MinLength: 8
    Description: RDS master password

  JWTSecret:
    Type: String
    Default: cGxhbnRjYXJlLW1vbml0b3Jpbmctand0LXNlY3JldC1rZXktZm9yLXByb2R1Y3Rpb24tMjAyNC1tc2MtcHJvamVjdC1zZWN1cmU=
    NoEcho: true
    Description: Base64-encoded JWT signing key (min 256 bits)

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64
    Description: Latest Amazon Linux 2023 AMI

# ============================================================
# Resources
# ============================================================
Resources:

  # ──────────────────────────────────────────────
  # 1. VPC & Networking
  # ──────────────────────────────────────────────
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-igw

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-public-subnet-1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-public-subnet-2

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-public-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  Subnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  Subnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # ──────────────────────────────────────────────
  # 2. Security Groups
  # ──────────────────────────────────────────────
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP, HTTPS, SSH, and Spring Boot
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH access
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0
          Description: Spring Boot
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-ec2-sg

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow PostgreSQL from EC2 only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref EC2SecurityGroup
          Description: PostgreSQL from EC2
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-rds-sg

  # ──────────────────────────────────────────────
  # 3. IAM Role for EC2
  # ──────────────────────────────────────────────
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-ec2-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: S3ReadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::${EnvironmentName}-artifacts-${AWS::AccountId}
                  - !Sub arn:aws:s3:::${EnvironmentName}-artifacts-${AWS::AccountId}/*

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub ${EnvironmentName}-ec2-profile
      Roles:
        - !Ref EC2Role

  # ──────────────────────────────────────────────
  # 4. EC2 Key Pair
  # ──────────────────────────────────────────────
  EC2KeyPair:
    Type: AWS::EC2::KeyPair
    Properties:
      KeyName: !Sub ${EnvironmentName}-keypair
      KeyType: rsa
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-keypair

  # ──────────────────────────────────────────────
  # 5. EC2 Instance
  # ──────────────────────────────────────────────
  EC2Instance:
    Type: AWS::EC2::Instance
    DependsOn: RDSInstance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref LatestAmiId
      KeyName: !Ref EC2KeyPair
      SubnetId: !Ref PublicSubnet1
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-backend
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail

          # Log all output
          exec > /var/log/user-data.log 2>&1

          echo "=== Plant Care EC2 Setup ==="

          # 1. Install Java 17
          yum install -y java-17-amazon-corretto-headless

          # 2. Install nginx
          yum install -y nginx

          # 3. Create application directory and user
          useradd -r -s /bin/false plantcare || true
          mkdir -p /opt/plantcare
          chown plantcare:plantcare /opt/plantcare

          # 4. Create environment file with RDS connection details
          cat > /opt/plantcare/.env << 'ENVEOF'
          DB_HOST=${RDSInstance.Endpoint.Address}
          DB_PORT=5432
          DB_NAME=plantcare
          DB_USER=plantcare_admin
          DB_PASSWORD=${DBPassword}
          JWT_SECRET=${JWTSecret}
          SPRING_PROFILES_ACTIVE=prod
          SERVER_PORT=8080
          ENVEOF
          chmod 600 /opt/plantcare/.env
          chown plantcare:plantcare /opt/plantcare/.env

          # 5. Create systemd service
          cat > /etc/systemd/system/plantcare.service << 'SVCEOF'
          [Unit]
          Description=Plant Care Monitoring System
          After=network.target

          [Service]
          Type=simple
          User=plantcare
          Group=plantcare
          WorkingDirectory=/opt/plantcare
          EnvironmentFile=/opt/plantcare/.env
          ExecStart=/usr/bin/java -jar -Dspring.profiles.active=prod /opt/plantcare/plantcare-app.jar
          Restart=on-failure
          RestartSec=10
          SuccessExitStatus=143
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier=plantcare

          [Install]
          WantedBy=multi-user.target
          SVCEOF

          systemctl daemon-reload
          systemctl enable plantcare

          # 6. Configure nginx reverse proxy
          cat > /etc/nginx/conf.d/plantcare.conf << 'NGXEOF'
          server {
              listen 80;
              server_name _;

              # Security headers
              add_header X-Frame-Options "SAMEORIGIN" always;
              add_header X-Content-Type-Options "nosniff" always;
              add_header X-XSS-Protection "1; mode=block" always;
              add_header Referrer-Policy "strict-origin-when-cross-origin" always;

              # API proxy
              location /api/ {
                  proxy_pass http://127.0.0.1:8080/api/;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_read_timeout 90;
              }

              # Health check
              location /actuator/health {
                  proxy_pass http://127.0.0.1:8080/actuator/health;
              }

              location / {
                  return 200 'Plant Care Backend Running';
                  add_header Content-Type text/plain;
              }
          }
          NGXEOF

          # Remove default nginx config
          rm -f /etc/nginx/conf.d/default.conf 2>/dev/null || true

          # Start nginx
          systemctl enable nginx
          systemctl start nginx

          # 7. Install security audit tools
          yum install -y clamav clamav-update chkrootkit 2>/dev/null || true

          echo "=== EC2 Setup Complete ==="

  # ──────────────────────────────────────────────
  # 6. RDS PostgreSQL
  # ──────────────────────────────────────────────
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnets for PlantCare RDS
      SubnetIds:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-db-subnet-group

  RDSInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub ${EnvironmentName}-db
      Engine: postgres
      EngineVersion: '15'
      DBInstanceClass: !Ref DBInstanceClass
      AllocatedStorage: 20
      StorageType: gp2
      MasterUsername: plantcare_admin
      MasterUserPassword: !Ref DBPassword
      DBName: plantcare
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      DBSubnetGroupName: !Ref DBSubnetGroup
      PubliclyAccessible: false
      BackupRetentionPeriod: 1
      DeletionProtection: false
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-database

  # ──────────────────────────────────────────────
  # 7. S3 Bucket (Frontend Hosting)
  # ──────────────────────────────────────────────
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${EnvironmentName}-frontend-${AWS::AccountId}
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-frontend

  # ──────────────────────────────────────────────
  # 8. CloudFront Distribution
  # ──────────────────────────────────────────────
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub ${EnvironmentName}-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontAccess
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub arn:aws:s3:::${FrontendBucket}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Comment: !Sub ${EnvironmentName} Frontend CDN

        # Frontend origin (S3)
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ''
          - Id: BackendOrigin
            DomainName: !GetAtt EC2Instance.PublicDnsName
            CustomOriginConfig:
              HTTPPort: 80
              OriginProtocolPolicy: http-only

        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          ForwardedValues:
            QueryString: false
          Compress: true

        # API routing to backend
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: BackendOrigin
            ViewerProtocolPolicy: allow-all
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            ForwardedValues:
              QueryString: true
              Headers:
                - Authorization
                - Content-Type
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled

        # SPA routing — serve index.html for all 404s
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

        PriceClass: PriceClass_100
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-cdn

# ============================================================
# Outputs
# ============================================================
Outputs:
  EC2PublicIP:
    Description: EC2 instance public IP address
    Value: !GetAtt EC2Instance.PublicIp
    Export:
      Name: !Sub ${EnvironmentName}-ec2-ip

  EC2PublicDNS:
    Description: EC2 instance public DNS
    Value: !GetAtt EC2Instance.PublicDnsName
    Export:
      Name: !Sub ${EnvironmentName}-ec2-dns

  RDSEndpoint:
    Description: RDS PostgreSQL endpoint
    Value: !GetAtt RDSInstance.Endpoint.Address
    Export:
      Name: !Sub ${EnvironmentName}-rds-endpoint

  S3BucketName:
    Description: S3 bucket for frontend
    Value: !Ref FrontendBucket
    Export:
      Name: !Sub ${EnvironmentName}-s3-bucket

  CloudFrontDomainName:
    Description: CloudFront distribution domain
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: !Sub ${EnvironmentName}-cloudfront-domain

  CloudFrontDistributionId:
    Description: CloudFront distribution ID
    Value: !Ref CloudFrontDistribution
    Export:
      Name: !Sub ${EnvironmentName}-cloudfront-id

  KeyPairId:
    Description: EC2 Key Pair ID (private key stored in SSM Parameter Store)
    Value: !GetAtt EC2KeyPair.KeyPairId
    Export:
      Name: !Sub ${EnvironmentName}-keypair-id

  ApplicationURL:
    Description: Public URL of the application
    Value: !Sub https://${CloudFrontDistribution.DomainName}

  VPCID:
    Description: VPC ID
    Value: !Ref VPC
