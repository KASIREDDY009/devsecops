# =============================================================================
# Automated Plant Care Monitoring System — Production Configuration
# =============================================================================
# Activated via SPRING_PROFILES_ACTIVE=prod.  All sensitive values MUST be
# supplied through environment variables — never hard-coded in this file.
#
# Security decision: ddl-auto is set to "validate" so Hibernate will NOT
# modify the schema at runtime.  Schema changes must go through a reviewed
# migration tool (Flyway / Liquibase) to prevent accidental data loss and
# to maintain an auditable change history — a DevOpsSec requirement.
# =============================================================================

# ---- DataSource (PostgreSQL) ------------------------------------------------
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# ---- Connection pool tuning (HikariCP) --------------------------------------
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ---- JPA / Hibernate --------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ---- JWT Configuration ------------------------------------------------------
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ---- Server ------------------------------------------------------------------
server.port=${SERVER_PORT:8080}

# ---- Logging -----------------------------------------------------------------
logging.level.com.plantcare=WARN
logging.level.org.springframework.security=WARN
