# =============================================================================
# Automated Plant Care Monitoring System — Development Configuration
# =============================================================================
# Environment variables (with sensible dev defaults) are used so the same
# artefact can be deployed across environments without rebuilding — a core
# twelve-factor app principle aligned with Cloud DevOpsSec best practices.
# =============================================================================

# ---- DataSource (PostgreSQL) ------------------------------------------------
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:plantcare}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# ---- JPA / Hibernate --------------------------------------------------------
# "update" is acceptable for development; production MUST use "validate"
# so that schema migrations are managed by Flyway / Liquibase instead.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ---- JWT Configuration ------------------------------------------------------
# SECURITY NOTE: The default secret is for local development ONLY.
# In production, JWT_SECRET must be injected via a secrets manager (e.g.
# AWS Secrets Manager, HashiCorp Vault) and must be at least 256 bits.
jwt.secret=${JWT_SECRET:defaultSecretKeyForDevelopmentOnlyMustBeAtLeast256BitsLong123456}
jwt.expiration=86400000

# ---- Server ------------------------------------------------------------------
server.port=${SERVER_PORT:8080}

# ---- Logging -----------------------------------------------------------------
logging.level.com.plantcare=INFO
