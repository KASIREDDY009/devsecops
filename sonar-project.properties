# =============================================================================
# SonarQube / SonarCloud Configuration
# =============================================================================
# This file configures static code analysis for the Plant Care Monitoring
# System. SonarQube performs deep analysis including code smells, bugs,
# vulnerabilities, duplications, and test coverage reporting.
# =============================================================================

sonar.projectKey=plantcare-monitoring
sonar.projectName=Automated Plant Care Monitoring System
sonar.projectVersion=1.0.0

# Source directories
sonar.sources=backend/src/main/java,frontend/src
sonar.tests=backend/src/test/java,frontend/src
sonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/*Test.java

# Java configuration
sonar.java.source=17
sonar.java.binaries=backend/target/classes
sonar.java.test.binaries=backend/target/test-classes

# Exclusions — third-party and generated code
sonar.exclusions=**/node_modules/**,**/build/**,**/target/**,**/*.min.js,**/*.min.css

# Coverage reports
sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
