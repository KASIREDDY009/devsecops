# =============================================================================
# SonarQube / SonarCloud Configuration
# =============================================================================
# This file configures static code analysis for the Plant Care Monitoring
# System. SonarQube performs deep analysis including code smells, bugs,
# vulnerabilities, duplications, and test coverage reporting.
# =============================================================================

sonar.projectKey=plantcare-monitoring
sonar.projectName=Automated Plant Care Monitoring System
sonar.projectVersion=1.0.0

# Source directories
sonar.sources=backend/app,frontend/src
sonar.tests=backend/tests,frontend/src
sonar.test.inclusions=**/*test*.py,**/*.test.js,**/*.test.jsx

# Python backend configuration
sonar.python.version=3.11
sonar.python.coverage.reportPaths=backend/coverage.xml

# Exclusions — third-party and generated code
sonar.exclusions=**/node_modules/**,**/build/**,**/venv/**,**/__pycache__/**,**/*.min.js,**/*.min.css

# Frontend coverage
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
